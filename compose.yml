services:
  waf:
    image: haproxy:lts-alpine
    user: root
    ports:
      - "8100:8080"
    volumes:
      - ./waf/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - web

  web:
    image: nginx:alpine
    ports:
      - "8200:80"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - tier1

  tier1:
    build:
      context: .
      args:
        TARGET: tier1
    ports:
      - "8300:8080"
    environment:
      - TIER2_ADDR=tier2:9400
      - QUEUE_URL=amqp://guest:guest@queue:5672/
      - SAAS_URL=http://saas:80/status.json
    depends_on:
      - queue
      - tier2
      - saas
    restart: on-failure

  tier2:
    build:
      context: .
      args:
        TARGET: tier2
    ports:
      - "8400:9400"
    environment:
      - DB_DSN=root:rootpass@tcp(db:3306)/demo
      - PORT=9400
    depends_on:
      - db
    restart: on-failure

  db:
    image: mysql:latest
    ports:
      - "8500:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=demo
    volumes:
      - ./db/bootstrap.sql:/docker-entrypoint-initdb.d/bootstrap.sql:ro

  queue:
    image: rabbitmq:3-management
    ports:
      - "8600:15672"
      - "8650:5672"

  cons:
    build:
      context: .
      args:
        TARGET: cons
    environment:
      - QUEUE_URL=amqp://guest:guest@queue:5672/
      - DB_DSN=root:rootpass@tcp(db:3306)/demo
    depends_on:
      - queue
      - db
    restart: on-failure

  saas:
    build:
      context: .
      args:
        TARGET: saas
    ports:
      - "8700:80"
