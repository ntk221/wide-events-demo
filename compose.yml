services:
  waf:
    image: haproxy:lts-alpine
    ports:
      - "8100:8080"
    volumes:
      - ./waf/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - web

  web:
    image: nginx:alpine
    ports:
      - "8200:80"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - tier1

  tier1:
    build:
      context: .
      args:
        TARGET: tier1
    ports:
      - "8300:8080"
    environment:
      - TIER2_ADDR=tier2:9400
      - QUEUE_URL=amqp://guest:guest@queue:5672/
      - SAAS_URL=https://www.githubstatus.com/api/v2/status.json
    depends_on:
      queue:
        condition: service_healthy
      tier2:
        condition: service_healthy

  tier2:
    build:
      context: .
      args:
        TARGET: tier2
    ports:
      - "8400:9400"
    environment:
      - DB_DSN=root:rootpass@tcp(db:3306)/demo
      - PORT=9400
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9401/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  db:
    image: mysql:latest
    ports:
      - "8500:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=demo
    volumes:
      - ./db/bootstrap.sql:/docker-entrypoint-initdb.d/bootstrap.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  queue:
    image: rabbitmq:3-management
    ports:
      - "8600:15672"
      - "8650:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 3s
      retries: 10

  cons:
    build:
      context: .
      args:
        TARGET: cons
    environment:
      - QUEUE_URL=amqp://guest:guest@queue:5672/
      - DB_DSN=root:rootpass@tcp(db:3306)/demo
    depends_on:
      queue:
        condition: service_healthy
      db:
        condition: service_healthy
